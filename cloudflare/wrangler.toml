name = "hireos-interview-worker"
main = "src/worker.ts"
compatibility_date = "2024-06-20"

[durable_objects]
bindings = [
  { name = "INTERVIEW_SESSION", class_name = "InterviewSessionDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["InterviewSessionDO"]

[ai]
binding = "AI"

[[r2_buckets]]
binding = "R2"
bucket_name = "hireos-recordings"

[vars]
ALLOWED_ORIGIN = "http://localhost:3000"
